name: Release

on:
  release:
    types: [released, prereleased, edited]

permissions:
  contents: write

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: KtLint Check
        run: ./gradlew ktlintCheck

      - name: Build
        run: ./gradlew clean build --no-configuration-cache

      - name: Generate API snapshot
        run: ./gradlew apiDump

      - name: Save API snapshot
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          mkdir -p "api/history/${VERSION}"

          find . -path "*/api/*.api" -type f | while read -r file; do
            module=$(basename "$(dirname "$(dirname "$file")")")
            cp "$file" "api/history/${VERSION}/${module}.api"
          done

      - name: Commit API snapshot
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          git config user.name github-actions
          git config user.email github-actions@github.com

          git fetch origin main
          git checkout main

          git add api/history

          if git diff --cached --quiet; then
            echo "No API snapshot changes"
            exit 0
          fi

          git commit -m "chore: add API snapshot ${VERSION}"
          git push origin main
          

      - name: Publish each module to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
        run: |
          for module in $(./gradlew -q publishableModules); do
            echo "::group::Publishing $module"
            ./gradlew "${module}:publishToMavenCentral" --no-configuration-cache --stacktrace
            echo "::endgroup::"
          done

      - name: Check deployment status on Central Portal
        if: always()
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          curl -s -X GET "https://central.sonatype.com/api/v1/publisher/deployments" \
            -u "$MAVEN_CENTRAL_USERNAME:$MAVEN_CENTRAL_PASSWORD" \
            -H "accept: application/json" \
            -o deployments.json

          python3 -c "
          import json
          with open('deployments.json') as f:
              data = json.load(f)
          for d in data.get('deployments', []):
              print(f\"{d.get('deploymentId')}  {d.get('deploymentState')}  {d.get('purls', [''])[0]}\")
          " || cat deployments.json

      - name: Upload deployment report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-report
          path: deployments.json
          if-no-files-found: ignore